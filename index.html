<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hứng Trái Cây</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f4f8; /* Màu nền ngoài khung game */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* Ngăn cuộn trang */
        }

        #game-container {
            width: 430px; /* Chiều rộng khung game (giống iPhone 14 Pro Max) */
            height: 932px; /* Chiều cao khung game */
            background: linear-gradient(to bottom, #A1C4FD 0%, #C2E9FB 100%); /* Nền gradient xanh */
            box-shadow: 0 0 20px rgba(0,0,0,0.1); /* Hiệu ứng đổ bóng */
            position: relative;
            overflow: hidden;
            border-radius: 10px;
        }

        /* HUD - Thanh trạng thái */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10; /* Đảm bảo HUD luôn ở trên cùng */
            pointer-events: none; /* Không cho phép tương tác với HUD */
        }

        #score-display {
            font-weight: bold;
            font-size: 24px;
            color: #333;
        }

        #lives-display {
            font-size: 24px;
            display: flex;
            gap: 5px;
        }

        .heart {
            color: #ff4d4d; /* Màu trái tim đỏ */
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Màn hình Game Over và Bắt đầu */
        #game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.9); /* Nền mờ cho overlay */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 20; /* Overlay ở trên HUD */
        }

        #game-overlay h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #333;
        }

        #game-overlay p {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }

        #final-score {
            font-weight: bold;
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
        }

        #start-button, #restart-button {
            background-color: #ffcc66; /* Màu vàng */
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #start-button:hover, #restart-button:hover {
            background-color: #ffbd4d;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <div id="score-display">Điểm: 0</div>
            <div id="lives-display">
                </div>
        </div>
        <canvas id="game-canvas"></canvas>

        <div id="game-overlay" class="start-screen">
            <h1>Chạm để bắt đầu!</h1>
            <p>Kéo giỏ để hứng trái cây, né bom nhé!</p>
            <button id="start-button">Bắt đầu</button>
        </div>

        <div id="game-overlay" class="game-over-screen" style="display: none;">
            <h1>Bùm! Hết mạng!</h1>
            <div id="final-score">Tổng điểm: 0</div>
            <button id="restart-button">Chơi lại</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const livesDisplay = document.getElementById('lives-display');
        const startScreen = document.querySelector('.start-screen');
        const gameOverScreen = document.querySelector('.game-over-screen');
        const finalScoreText = document.getElementById('final-score');
        const startButton = document.getElementById('start-button');
        const restartButton = document.getElementById('restart-button');

        // Cấu hình game
        const gameWidth = 430;
        const gameHeight = 932;
        canvas.width = gameWidth;
        canvas.height = gameHeight;

        // Biến game
        let score = 0;
        let lives = 5; // Yêu cầu 2: 5 mạng
        let isPlaying = false;
        let isGameOver = false;
        let items = [];
        let player;
        let itemInterval = 80; // Tốc độ tạo item ban đầu
        let framesSinceLastItem = 0;

        // Cấu hình người chơi (giỏ)
        const playerWidth = 100;
        const playerHeight = 100;
        const playerY = gameHeight - playerHeight - 20;

        // Cấu hình item (trái cây và bom)
        const itemSize = 50;
        const fruitEmojis = ['🍇', '🍐', '🍓', '🍊'];
        const bombEmoji = '💣';

        class Player {
            constructor() {
                this.x = gameWidth / 2 - playerWidth / 2;
                this.y = playerY;
                this.width = playerWidth;
                this.height = playerHeight;
                this.dx = 0;
                this.emoji = '🧺'; // Giỏ
            }

            draw() {
                ctx.font = `${this.height}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText(this.emoji, this.x + this.width / 2, this.y + this.height / 1.15);
            }

            update(mouseX) {
                this.x = mouseX - this.width / 2;
                // Giới hạn di chuyển trong khung game
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > gameWidth) this.x = gameWidth - this.width;
            }
        }

        class Item {
            constructor(emoji, isBomb) {
                this.x = Math.random() * (gameWidth - itemSize);
                this.y = -itemSize;
                this.width = itemSize;
                this.height = itemSize;
                this.speed = Math.random() * 2 + 3; // Tốc độ rơi từ 3 đến 5
                this.emoji = emoji;
                this.isBomb = isBomb;
            }

            draw() {
                ctx.font = `${this.height}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText(this.emoji, this.x + this.width / 2, this.y + this.height / 1.15);
            }

            update() {
                this.y += this.speed;
            }
        }

        function createItem() {
            let isBomb = Math.random() < 0.2; // 20% khả năng tạo bom
            let emoji = isBomb ? bombEmoji : fruitEmojis[Math.floor(Math.random() * fruitEmojis.length)];
            items.push(new Item(emoji, isBomb));
        }

        function updateLivesDisplay() {
            livesDisplay.innerHTML = '';
            for (let i = 0; i < lives; i++) {
                livesDisplay.innerHTML += '<span class="heart">❤️</span>';
            }
        }

        function gameLoop() {
            if (!isPlaying) return;

            // Xóa canvas
            ctx.clearRect(0, 0, gameWidth, gameHeight);

            // Vẽ người chơi
            player.draw();

            // Cập nhật và vẽ các item
            for (let i = items.length - 1; i >= 0; i--) {
                items[i].update();
                items[i].draw();

                // Kiểm tra va chạm với giỏ
                if (items[i].x < player.x + player.width &&
                    items[i].x + items[i].width > player.x &&
                    items[i].y < player.y + player.height &&
                    items[i].y + items[i].height > player.y) {

                    if (items[i].isBomb) {
                        // Sửa lỗi: Trúng bom thì giảm mạng và không hứng
                        lives--;
                        updateLivesDisplay();
                        // Không hứng trái cây này
                    } else {
                        // Hứng trái cây thì tăng điểm
                        score++;
                        scoreDisplay.innerText = `Điểm: ${score}`;
                    }
                    items.splice(i, 1);
                    checkGameOver();
                    continue; // Bỏ qua phần kiểm tra rơi xuống
                }

                // Kiểm tra item rơi xuống đất
                if (items[i].y > gameHeight) {
                    if (!items[i].isBomb) {
                        // Yêu cầu 3: Không hứng được trái cây cũng mất mạng
                        lives--;
                        updateLivesDisplay();
                    }
                    items.splice(i, 1);
                    checkGameOver();
                }
            }

            // Tạo item mới
            framesSinceLastItem++;
            if (framesSinceLastItem > itemInterval) {
                createItem();
                framesSinceLastItem = 0;
            }

            // Tăng độ khó dần
            if (score > 0 && score % 10 === 0 && itemInterval > 20) {
                itemInterval -= 10;
                score++; // Tạm thời tăng điểm để tránh gọi lại dòng này
            }

            requestAnimationFrame(gameLoop);
        }

        function checkGameOver() {
            if (lives <= 0) {
                isPlaying = false;
                isGameOver = true;
                gameOverScreen.style.display = 'flex';
                finalScoreText.innerText = `Tổng điểm: ${score}`;
            }
        }

        function startGame() {
            score = 0;
            lives = 5;
            items = [];
            itemInterval = 80;
            framesSinceLastItem = 0;
            scoreDisplay.innerText = `Điểm: 0`;
            updateLivesDisplay();
            player = new Player();
            isPlaying = true;
            isGameOver = false;
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            gameLoop();
        }

        // Xử lý sự kiện di chuyển
        function handleMove(e) {
            if (!isPlaying || isGameOver) return;
            const containerRect = document.getElementById('game-container').getBoundingClientRect();
            let mouseX;
            if (e.type === 'touchmove') {
                mouseX = e.touches[0].clientX - containerRect.left;
            } else {
                mouseX = e.clientX - containerRect.left;
            }
            // Chuyển đổi tọa độ màn hình sang tọa độ canvas
            const scaleX = gameWidth / containerRect.width;
            player.update(mouseX * scaleX);
        }

        document.getElementById('game-container').addEventListener('mousemove', handleMove);
        document.getElementById('game-container').addEventListener('touchmove', handleMove);

        startButton.addEventListener('click', startGame);
        restartButton.addEventListener('click', startGame);

        // Hiển thị 5 mạng ban đầu
        updateLivesDisplay();

    </script>
</body>
</html>
