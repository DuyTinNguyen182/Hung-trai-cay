<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hứng Trái Cây</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(to bottom, #a1c4fd 0%, #c2e9fb 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            touch-action: none; /* Ngăn cuộn trang khi vuốt */
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            pointer-events: none;
            z-index: 10;
        }
        #ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 20;
        }
        #ui h1 {
            margin: 0 0 15px 0;
            color: #e74c3c;
        }
        #ui p {
            font-size: 22px;
            margin-bottom: 25px;
        }
        button {
            padding: 12px 30px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background-color: #f39c12;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        button:active {
            transform: scale(0.95);
        }
        #startScreen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.5);
            z-index: 100;
        }
        .start-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .start-box h2 {
            margin: 0 0 10px 0;
            color: #2c3e50;
        }
        .start-box p {
            margin: 0;
            color: #555;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="scoreDisplay">Điểm: 0</div>
        <div id="livesDisplay">❤️❤️❤️❤️❤️</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div id="startScreen">
        <div class="start-box">
            <h2>Chạm để bắt đầu!</h2>
            <p>Kéo giỏ hứng trái cây.<br>Trượt hoặc dính bom = Mất mạng!</p>
        </div>
    </div>

    <div id="ui">
        <h1>Game Over!</h1>
        <p>Tổng điểm: <span id="finalScore">0</span></p>
        <button id="restartBtn">Chơi lại</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const finalScoreText = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const startScreen = document.getElementById('startScreen');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const livesDisplay = document.getElementById('livesDisplay');

        // Khai báo giỏ (player) TRƯỚC khi gọi resize để tránh lỗi ReferenceError
        const player = {
            x: window.innerWidth / 2,
            y: window.innerHeight - 80,
            size: 60,
            draw() {
                ctx.font = this.size + "px Arial";
                ctx.fillText("🧺", this.x, this.y);
            }
        };

        // Hàm thay đổi kích thước canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            player.y = canvas.height - 80;
        }
        window.addEventListener('resize', resize);
        
        // Khởi tạo kích thước sau khi đã có biến player
        resize();

        // Biến trạng thái game
        let score = 0;
        let lives = 5;
        let isPlaying = false;
        let isGameOver = false;
        let frames = 0;
        let fallSpeed = 4;
        let items = [];

        // Thiết lập vẽ ở giữa tọa độ
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        const fruitEmojis = ["🍎", "🍊", "🍇", "🍌", "🍉", "🍓", "🍒"];
        const bombEmoji = "💣";

        function spawnItem() {
            let spawnRate = Math.max(25, 80 - score); 
            
            if (frames % spawnRate === 0) {
                let isBomb = Math.random() < 0.2; // 20% tỉ lệ ra bom
                let emoji = isBomb ? bombEmoji : fruitEmojis[Math.floor(Math.random() * fruitEmojis.length)];
                
                items.push({
                    x: Math.random() * (canvas.width - 60) + 30, // Tránh rớt sát lề
                    y: -40,
                    size: 40,
                    emoji: emoji,
                    isBomb: isBomb,
                    speed: fallSpeed + Math.random() * 2 
                });
            }
        }

        function handleItems() {
            for (let i = 0; i < items.length; i++) {
                let item = items[i];
                item.y += item.speed;

                ctx.font = item.size + "px Arial";
                ctx.fillText(item.emoji, item.x, item.y);

                // Kiểm tra va chạm với giỏ
                let dx = player.x - item.x;
                let dy = player.y - item.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < (player.size / 2 + item.size / 2 - 10)) {
                    if (item.isBomb) {
                        loseLife(); // Hứng trúng bom -> mất mạng
                    } else {
                        score++;
                        updateHUD();
                        if (score % 10 === 0) fallSpeed += 0.5; // Tăng tốc độ rơi
                    }
                    items.splice(i, 1);
                    i--;
                    continue;
                }

                // Nếu item rớt xuống đáy màn hình
                if (item.y - item.size > canvas.height) {
                    if (!item.isBomb) {
                        loseLife(); // Rớt trái cây -> mất mạng
                    }
                    items.splice(i, 1);
                    i--;
                }
            }
        }

        function updateHUD() {
            scoreDisplay.innerText = "Điểm: " + score;
            let hearts = "";
            for (let i = 0; i < lives; i++) hearts += "❤️";
            livesDisplay.innerText = hearts;
        }

        function loseLife() {
            lives--;
            updateHUD();
            if (lives <= 0) {
                gameOver();
            }
        }

        function animate() {
            if (isGameOver) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (isPlaying) {
                spawnItem();
                handleItems();
                frames++;
            }
            
            player.draw();
            requestAnimationFrame(animate);
        }

        function startGame() {
            isPlaying = true;
            startScreen.style.display = 'none';
        }

        function gameOver() {
            isGameOver = true;
            isPlaying = false;
            ui.style.display = 'block';
            finalScoreText.innerText = score;
        }

        function resetGame() {
            score = 0;
            lives = 5;
            frames = 0;
            fallSpeed = 4;
            items = [];
            isGameOver = false;
            isPlaying = true;
            ui.style.display = 'none';
            updateHUD();
            animate();
        }

        // --- ĐIỀU KHIỂN ---
        function movePlayer(clientX) {
            if (!isPlaying || isGameOver) return;
            player.x = clientX;
            if (player.x < player.size / 2) player.x = player.size / 2;
            if (player.x > canvas.width - player.size / 2) player.x = canvas.width - player.size / 2;
        }

        // Bắt sự kiện chạm (Mobile) / F12 DevTools
        window.addEventListener('touchstart', (e) => {
            if (e.target.id === 'restartBtn') return; 
            if (!isPlaying && !isGameOver) {
                startGame();
            } else if (isPlaying) {
                movePlayer(e.touches[0].clientX);
            }
        }, {passive: false});

        window.addEventListener('touchmove', (e) => {
            movePlayer(e.touches[0].clientX);
        });

        // Bắt sự kiện click/di chuột (PC)
        window.addEventListener('mousedown', (e) => {
            if (e.target.id === 'restartBtn') return;
            if (!isPlaying && !isGameOver) {
                startGame();
            }
        });

        window.addEventListener('mousemove', (e) => {
            movePlayer(e.clientX);
        });

        // Nút chơi lại
        restartBtn.addEventListener('click', resetGame);
        restartBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            resetGame();
        });

        // Chạy frame đầu tiên
        updateHUD();
        animate();
    </script>
</body>
</html>
